name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update || true
          sudo apt-get install -y \
            xvfb \
            libxcb-xinerama0 \
            libxcb-cursor0 \
            libxkbcommon-x11-0

      - name: Install Python dependencies
        run: pip install PyQt5 pynput Pillow pytest pytest-qt

      - name: Run tests
        run: xvfb-run --auto-servernum pytest
