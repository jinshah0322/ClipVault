name: Publish to PPA

on:
  push:
    tags:
      - "v*"

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  ppa:
    runs-on: ubuntu-22.04
    needs: [ci]

    steps:
      - uses: actions/checkout@v4

      - name: Install packaging tools
        run: |
          sudo apt-get install -y devscripts debhelper dh-python \
            python3-all gnupg dput

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          mkdir -p ~/.gnupg
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpg-connect-agent reloadagent /bye

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Prepare source directory and orig tarball
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          cd ..
          cp -r ClipVault clipvault-${VERSION}
          rm -rf clipvault-${VERSION}/.git
          tar -czf clipvault_${VERSION}.orig.tar.gz \
            --exclude="clipvault-${VERSION}/debian" \
            clipvault-${VERSION}

      - name: Update debian changelog version
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          sed -i "s/^clipvault ([^)]*)/clipvault (${VERSION}-1)/" debian/changelog

      - name: Build source package
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          echo "$GPG_PASSPHRASE" | gpg --batch --yes \
            --passphrase-fd 0 --pinentry-mode loopback \
            --sign --output /dev/null /dev/null 2>/dev/null || true
          cd ../clipvault-${VERSION}
          debuild -S -sa -k"${{ secrets.GPG_KEY_ID }}"

      - name: Upload to Launchpad PPA
        run: |
          dput ppa:jinshah0322/clipvault ../clipvault_*.changes
